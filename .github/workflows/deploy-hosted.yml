name: Deploy Hosted

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for the deployment
        required: true
        default: eu-central-1
      payments_provider_url:
        description: Provider URL passed to the backend runtime
        required: true
        default: https://api.sandbox.paynow.pl/v1/payments

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PROJECT_SLUG: store
      STACK_PREFIX: Store
      AWS_REGION: ${{ inputs.aws_region }}
      CDK_DEFAULT_REGION: ${{ inputs.aws_region }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
      PAYMENTS_PROVIDER_URL: ${{ inputs.payments_provider_url }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install CDK dependencies
        working-directory: infra
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install --global aws-cdk

      - name: Bootstrap CDK
        working-directory: infra
        run: cdk bootstrap aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION}

      - name: Deploy foundation stacks
        working-directory: infra
        run: >-
          cdk deploy
          ${STACK_PREFIX}Network
          ${STACK_PREFIX}Database
          ${STACK_PREFIX}Containers
          --require-approval never

      - name: Resolve foundation outputs
        id: foundation
        run: |
          backend_repo_uri=$(aws ecr describe-repositories --repository-names "${PROJECT_SLUG}-backend" --query "repositories[0].repositoryUri" --output text)
          frontend_repo_uri=$(aws ecr describe-repositories --repository-names "${PROJECT_SLUG}-frontend" --query "repositories[0].repositoryUri" --output text)

          if [ -z "$backend_repo_uri" ] || [ "$backend_repo_uri" = "None" ]; then
            echo "Could not resolve backend ECR repository URI" >&2
            exit 1
          fi

          if [ -z "$frontend_repo_uri" ] || [ "$frontend_repo_uri" = "None" ]; then
            echo "Could not resolve frontend ECR repository URI" >&2
            exit 1
          fi

          echo "backend_repo_uri=$backend_repo_uri" >> "$GITHUB_OUTPUT"
          echo "frontend_repo_uri=$frontend_repo_uri" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        env:
          BACKEND_REPO_URI: ${{ steps.foundation.outputs.backend_repo_uri }}
        run: |
          docker build -f backend/Dockerfile -t "$BACKEND_REPO_URI:$IMAGE_TAG" backend
          docker tag "$BACKEND_REPO_URI:$IMAGE_TAG" "$BACKEND_REPO_URI:latest"

      - name: Push backend image
        env:
          BACKEND_REPO_URI: ${{ steps.foundation.outputs.backend_repo_uri }}
        run: |
          docker push "$BACKEND_REPO_URI:$IMAGE_TAG"
          docker push "$BACKEND_REPO_URI:latest"

      - name: Build frontend image
        env:
          FRONTEND_REPO_URI: ${{ steps.foundation.outputs.frontend_repo_uri }}
        run: |
          docker build \
            --build-arg EXPO_PUBLIC_API_BASE_URL=/api \
            -f frontend/Dockerfile \
            -t "$FRONTEND_REPO_URI:$IMAGE_TAG" \
            frontend
          docker tag "$FRONTEND_REPO_URI:$IMAGE_TAG" "$FRONTEND_REPO_URI:latest"

      - name: Push frontend image
        env:
          FRONTEND_REPO_URI: ${{ steps.foundation.outputs.frontend_repo_uri }}
        run: |
          docker push "$FRONTEND_REPO_URI:$IMAGE_TAG"
          docker push "$FRONTEND_REPO_URI:latest"

      - name: Deploy compute and CDN stacks
        working-directory: infra
        run: >-
          cdk deploy
          ${STACK_PREFIX}Compute
          ${STACK_PREFIX}Cdn
          --require-approval never

      - name: Resolve compute outputs
        id: compute
        run: |
          cluster_name=$(aws cloudformation describe-stacks --stack-name ${STACK_PREFIX}Compute --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" --output text)
          backend_service_name=$(aws cloudformation describe-stacks --stack-name ${STACK_PREFIX}Compute --query "Stacks[0].Outputs[?OutputKey=='BackendServiceName'].OutputValue" --output text)
          frontend_service_name=$(aws cloudformation describe-stacks --stack-name ${STACK_PREFIX}Compute --query "Stacks[0].Outputs[?OutputKey=='FrontendServiceName'].OutputValue" --output text)
          chroma_service_name=$(aws cloudformation describe-stacks --stack-name ${STACK_PREFIX}Compute --query "Stacks[0].Outputs[?OutputKey=='ChromaServiceName'].OutputValue" --output text)
          payments_secret_name=$(aws cloudformation describe-stacks --stack-name ${STACK_PREFIX}Compute --query "Stacks[0].Outputs[?OutputKey=='PaymentsSecretName'].OutputValue" --output text)

          for value_name in cluster_name backend_service_name frontend_service_name chroma_service_name payments_secret_name; do
            value="${!value_name}"
            if [ -z "$value" ] || [ "$value" = "None" ]; then
              echo "Could not resolve compute output: $value_name" >&2
              exit 1
            fi
          done

          echo "cluster_name=$cluster_name" >> "$GITHUB_OUTPUT"
          echo "backend_service_name=$backend_service_name" >> "$GITHUB_OUTPUT"
          echo "frontend_service_name=$frontend_service_name" >> "$GITHUB_OUTPUT"
          echo "chroma_service_name=$chroma_service_name" >> "$GITHUB_OUTPUT"
          echo "payments_secret_name=$payments_secret_name" >> "$GITHUB_OUTPUT"

      - name: Sync payments secret
        env:
          PAYMENTS_SECRET_NAME: ${{ steps.compute.outputs.payments_secret_name }}
          PAYMENTS_API_KEY: ${{ secrets.PAYMENTS_SETTINGS__API_KEY }}
          PAYMENTS_SIGN_PHRASE: ${{ secrets.PAYMENTS_SETTINGS__SIGN_PHRASE }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if aws secretsmanager describe-secret --secret-id "$PAYMENTS_SECRET_NAME" >/dev/null 2>&1; then
              break
            fi

            if [ "$attempt" = "6" ]; then
              echo "Payments secret was not found after compute deploy: $PAYMENTS_SECRET_NAME" >&2
              exit 1
            fi

            echo "Waiting for payments secret to become available: $PAYMENTS_SECRET_NAME"
            sleep 10
          done

          aws secretsmanager put-secret-value \
            --secret-id "$PAYMENTS_SECRET_NAME" \
            --secret-string "{\"api_key\":\"$PAYMENTS_API_KEY\",\"sign_phrase\":\"$PAYMENTS_SIGN_PHRASE\"}"

      - name: Force ECS rollout
        env:
          CLUSTER_NAME: ${{ steps.compute.outputs.cluster_name }}
          BACKEND_SERVICE_NAME: ${{ steps.compute.outputs.backend_service_name }}
          FRONTEND_SERVICE_NAME: ${{ steps.compute.outputs.frontend_service_name }}
          CHROMA_SERVICE_NAME: ${{ steps.compute.outputs.chroma_service_name }}
        run: |
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$BACKEND_SERVICE_NAME" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$FRONTEND_SERVICE_NAME" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$CHROMA_SERVICE_NAME" --force-new-deployment
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$BACKEND_SERVICE_NAME" "$FRONTEND_SERVICE_NAME" "$CHROMA_SERVICE_NAME"

      - name: Print CloudFront URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${STACK_PREFIX}Cdn \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text