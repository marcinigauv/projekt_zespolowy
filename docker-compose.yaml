services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_BASE_URL: /api
    container_name: frontend
    ports:
      - "8081:8080"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      AUTH_SETTINGS__PASSWORD_PEPPER: ${AUTH_SETTINGS__PASSWORD_PEPPER}
      DB_SQL_SETTINGS__HOST: postgres
      DB_SQL_SETTINGS__PORT: 5432
      DB_SQL_SETTINGS__USERNAME: ${DB_SQL_SETTINGS__USERNAME}
      DB_SQL_SETTINGS__PASSWORD: ${DB_SQL_SETTINGS__PASSWORD}
      DB_SQL_SETTINGS__DATABASE: ${DB_SQL_SETTINGS__DATABASE}
      VECTOR_STORE_SETTINGS__CHROMA_HOST: chroma
      VECTOR_STORE_SETTINGS__CHROMA_PORT: 8000
      VECTOR_STORE_SETTINGS__CHROMA_ANONYMIZED_TELEMETRY: ${VECTOR_STORE_SETTINGS__CHROMA_ANONYMIZED_TELEMETRY}
      PAYMENTS_SETTINGS__PROVIDER_URL: ${PAYMENTS_SETTINGS__PROVIDER_URL}
      PAYMENTS_SETTINGS__API_KEY: ${PAYMENTS_SETTINGS__API_KEY}
      PAYMENTS_SETTINGS__SIGN_PHRASE: ${PAYMENTS_SETTINGS__SIGN_PHRASE}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      # chroma:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthcheck').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  db_initializer:
    profiles: ["initializer"]
    build:
      context: ./backend
      dockerfile: db_initializer/Dockerfile
    container_name: db_initializer
    environment:
      AUTH_SETTINGS__PASSWORD_PEPPER: ${AUTH_SETTINGS__PASSWORD_PEPPER}
      DB_SQL_SETTINGS__HOST: postgres
      DB_SQL_SETTINGS__PORT: 5432
      DB_SQL_SETTINGS__USERNAME: ${DB_SQL_SETTINGS__USERNAME}
      DB_SQL_SETTINGS__PASSWORD: ${DB_SQL_SETTINGS__PASSWORD}
      DB_SQL_SETTINGS__DATABASE: ${DB_SQL_SETTINGS__DATABASE}
      VECTOR_STORE_SETTINGS__CHROMA_HOST: chroma
      VECTOR_STORE_SETTINGS__CHROMA_PORT: 8000
      VECTOR_STORE_SETTINGS__CHROMA_ANONYMIZED_TELEMETRY: ${VECTOR_STORE_SETTINGS__CHROMA_ANONYMIZED_TELEMETRY}
      PAYMENTS_SETTINGS__PROVIDER_URL: ${PAYMENTS_SETTINGS__PROVIDER_URL}
      PAYMENTS_SETTINGS__API_KEY: ${PAYMENTS_SETTINGS__API_KEY}
      PAYMENTS_SETTINGS__SIGN_PHRASE: ${PAYMENTS_SETTINGS__SIGN_PHRASE}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:18-alpine
    hostname: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: ${DB_SQL_SETTINGS__DATABASE:-postgres}
      POSTGRES_USER: ${DB_SQL_SETTINGS__USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_SQL_SETTINGS__PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    hostname: chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/chroma/chroma"
      ANONYMIZED_TELEMETRY: "FALSE"
      # CHROMA_SERVER_AUTHN_CREDENTIALS: "secret-token"   # opcjonalny token, dodamy później
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: always
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8001/api/v2/heartbeat"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres18_data:
    driver: local
  chroma_data:
    driver: local