  postgres:
    image: postgres:18-alpine
    hostname: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: ${DB_SQL_SETTINGS__DATABASE:-postgres}
      POSTGRES_USER: ${DB_SQL_SETTINGS__USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_SQL_SETTINGS__PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    hostname: chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/chroma/chroma"
      ANONYMIZED_TELEMETRY: "FALSE"
      # CHROMA_SERVER_AUTHN_CREDENTIALS: "secret-token"   # opcjonalny token, dodamy później
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v2/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local